# Variables dans GitLab CICD:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_DEFAULT_REGION

default:
  tags:
    - chatwoot-runner


stages:
  - validate
  - build-ami
  - plan-staging
  - plan-production
  - apply-staging
  - apply-production


# TEMPLATES

.terraform-base:
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  before_script:
    - cd $TF_ROOT

.packer-build:
  stage: build-ami
  image:
    name: hashicorp/packer:1.11
    entrypoint: [""]
  variables:
    ANSIBLE_REMOTE_TEMP: /tmp/.ansible/tmp
  before_script:
    - apk add --no-cache ansible openssh-client
    - cd infra/packer
    - packer init .


# VALIDATE — toutes les MRs vers staging

format:
  extends: .terraform-base
  stage: validate
  variables:
    TF_ROOT: infra/terraform
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "staging"
  script:
    - terraform fmt -check -recursive

validate-staging:
  extends: .terraform-base
  stage: validate
  variables:
    TF_ROOT: infra/terraform/environments/staging
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "staging"
  script:
    - terraform init -backend=false
    - terraform validate

validate-production:
  extends: .terraform-base
  stage: validate
  variables:
    TF_ROOT: infra/terraform/environments/production
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "staging"
  script:
    - terraform init -backend=false
    - terraform validate


# BUILD AMI — rebuild en fonction de ce qu'il y a de changé

build-ami:chatwoot:
  extends: .packer-build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
      changes:
        - infra/packer/common.pkr.hcl
        - infra/packer/chatwoot.pkr.hcl
        - infra/ansible/chatwoot-playbook.yml
        - infra/docker/docker-compose-staging.yml
        - infra/docker/docker-compose-prod.yml
        - infra/docker/scripts/chatwoot-start.sh
        - infra/docker/config/nginx.conf
  script:
    - packer build -only=amazon-ebs.chatwoot .

build-ami:monitoring:
  extends: .packer-build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
      changes:
        - infra/packer/common.pkr.hcl
        - infra/packer/monitoring.pkr.hcl
        - infra/ansible/monitoring-playbook.yml
        - infra/docker/docker-compose-monitoring.yml
        - infra/docker/scripts/monitoring-start.sh
        - infra/docker/config/prometheus-*.yml
        - infra/docker/grafana/**/*
  script:
    - packer build -only=amazon-ebs.monitoring .

build-ami:bastion:
  extends: .packer-build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
      changes:
        - infra/packer/bastion.pkr.hcl
        - infra/packer/common.pkr.hcl
        - infra/ansible/bastion-playbook.yml
  script:
    - packer build -only=amazon-ebs.bastion .


# PLAN STAGING — MR staging vers main

plan-staging:
  extends: .terraform-base
  stage: plan-staging
  variables:
    TF_ROOT: infra/terraform/environments/staging
  needs:
    - job: build-ami:chatwoot
      optional: true
    - job: build-ami:monitoring
      optional: true
    - job: build-ami:bastion
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
  script:
    - terraform init
    - terraform plan -no-color -out=staging.tfplan
  artifacts:
    paths:
      - $TF_ROOT/staging.tfplan
    expire_in: 1 day


# PLAN PRODUCTION — MR staging vers main

plan-production:
  extends: .terraform-base
  stage: plan-production
  variables:
    TF_ROOT: infra/terraform/environments/production
  needs:
    - job: build-ami:chatwoot
      optional: true
    - job: build-ami:monitoring
      optional: true
    - job: build-ami:bastion
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
  script:
    - terraform init
    - terraform plan -no-color -out=production.tfplan
  artifacts:
    paths:
      - $TF_ROOT/production.tfplan
    expire_in: 1 day


# APPLY STAGING — intervention manuelle après merge vers main

apply-staging:
  extends: .terraform-base
  stage: apply-staging
  variables:
    TF_ROOT: infra/terraform/environments/staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  script:
    - terraform init
    - terraform apply -auto-approve -no-color
    - terraform output -json > outputs.json
  artifacts:
    name: "terraform-staging-apply-$CI_COMMIT_SHORT_SHA"
    paths:
      - $TF_ROOT/outputs.json
    expire_in: 7 days
    when: always


# APPLY PRODUCTION — intervention manuelle après merge vers main

apply-production:
  extends: .terraform-base
  stage: apply-production
  variables:
    TF_ROOT: infra/terraform/environments/production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  script:
    - terraform init
    - terraform apply -auto-approve -no-color
    - terraform output -json > outputs.json
  artifacts:
    name: "terraform-production-apply-$CI_COMMIT_SHORT_SHA"
    paths:
      - $TF_ROOT/outputs.json
    expire_in: 7 days
    when: always
