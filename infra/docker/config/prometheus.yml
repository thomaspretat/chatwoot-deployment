global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'chatwoot-nodes'
    ec2_sd_configs:
      - region: eu-west-3
        port: 9100
        filters:
          - name: "tag:Role"
            values: ["chatwoot"]