- hosts: all
  become: true # Faire les tâches en root
  tasks:
    - name: Update apt
      apt:
        update_cache: true # apt update
        upgrade: dist # upgrade

    - name: Installer les packages utiles
      apt:
        name:
          - curl
          - unzip
          - fail2ban
          - ufw

    - name: Installer AWS CLI v2
      shell: |
        curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
        unzip -q /tmp/awscliv2.zip -d /tmp
        /tmp/aws/install
        rm -rf /tmp/awscliv2.zip /tmp/aws

    # Chatwoot provision

    - name: Installer Docker
      shell: curl -fsSL https://get.docker.com | sh # Utiliser le convenient script disponible plus simple

    - name: Créer le dossier de l'app
      file:
        path: /app/chatwoot
        state: directory

    - name: Copier le docker-compose prod
      copy:
        src: ../docker/docker-compose-prod.yml
        dest: /app/chatwoot/docker-compose-prod.yml

    - name: Copier le docker-compose staging
      copy:
        src: ../docker/docker-compose-staging.yml
        dest: /app/chatwoot/docker-compose-staging.yml

    - name: Copier la config Nginx
      copy:
        src: ../docker/config/nginx.conf
        dest: /app/chatwoot/nginx.conf

    - name: Copier le script de démarrage chatwoot
      copy:
        src: ../docker/scripts/chatwoot-start.sh
        dest: /app/chatwoot/chatwoot-start.sh
        mode: "0755"

    - name: Créer le service systemd chatwoot
      copy:
        dest: /etc/systemd/system/chatwoot.service
        content: |
          [Unit]
          Description=Chatwoot startup (SSM secrets + Docker Compose)
          After=network-online.target docker.service
          Wants=network-online.target docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/app/chatwoot/chatwoot-start.sh

          [Install]
          WantedBy=multi-user.target

    - name: Activer le service chatwoot
      systemd_service:
        name: chatwoot
        enabled: yes
        daemon_reload: yes

    - name: Pré-pull de l'image Chatwoot # cache les layers dans l'AMI pour un pull plus rapide lors du script de provisionning
      shell: cd /app/chatwoot && docker compose -f docker-compose-prod.yml pull

    # SSH Hardening

    - name: Changer le port SSH à 2022
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?Port "
        line: "Port 2022"

    - name: Désactiver le login root SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"

    - name: Désactiver authentification par mot de passe
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"

    - name: Configurer fail2ban pour SSH
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [sshd]
          enabled = true
          port = 2022
          maxretry = 3
          bantime = 3600
          findtime = 600

    - name: Activer et démarrer fail2ban
      systemd_service:
        name: fail2ban
        enabled: yes
        state: started

    #-----------------UFW

    - name: Bloquer tout le trafic entrant par défaut
      ufw:
        default: deny
        direction: incoming

    - name: Autoriser tout le trafic sortant par défaut
      ufw:
        default: allow
        direction: outgoing

    - name: Autoriser SSH sur le port 2022
      ufw:
        rule: allow
        port: "2022"
        proto: tcp

    - name: Autoriser le port 3000 (Chatwoot)
      ufw:
        rule: allow
        port: "3000"
        proto: tcp

    - name: Autoriser le port 80 (Nginx staging)
      ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Autoriser le port 9121 (redis-exporter)
      ufw:
        rule: allow
        port: "9121"
        proto: tcp

    - name: Autoriser le port 9100 (node-exporter)
      ufw:
        rule: allow
        port: "9100"
        proto: tcp

    - name: Activer UFW
      ufw:
        state: enabled

    #-----------------Restart services

    - name: Redémarrer sshd
      systemd_service:
        name: ssh
        state: restarted
